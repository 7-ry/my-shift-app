name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: npm ci && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_UI_PASS: ${{ secrets.VITE_UI_PASS }}
          VITE_UI_VIEWER_PASS: ${{ secrets.VITE_UI_VIEWER_PASS }}
          VITE_FB_ADMIN_EMAIL: ${{ secrets.VITE_FB_ADMIN_EMAIL }}
          VITE_FB_ADMIN_PASS: ${{ secrets.VITE_FB_ADMIN_PASS }}
          VITE_GAS_URL: ${{ secrets.VITE_GAS_URL }}
          VITE_FB_VIEWER_EMAIL: ${{ secrets.VITE_FB_VIEWER_EMAIL }}
          VITE_FB_VIEWER_PASS: ${{ secrets.VITE_FB_VIEWER_PASS }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_RESTAURANT_SHIFT }}
          channelId: live
          projectId: my-restaurant-shift
