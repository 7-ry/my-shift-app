name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/**'
      - 'gas/**'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get git diff
        id: get_diff
        run: |
          git diff origin/${{ github.base_ref }} HEAD > pr_diff.txt
          echo "diff_path=pr_diff.txt" >> $GITHUB_OUTPUT

      - name: Gemini AI Review
        uses: google-gemini/gemini-github-action@v1 # 2026年時点の標準的なアクションを想定
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          model: 'gemini-3-flash'
          system-instruction: |
            あなたは「Shift Builder」のシニアエンジニアです。
            React 18, Vite, Tailwind CSS, Firestoreのスタックに精通しています。
            PRのdiffを分析し、以下の3点を日本語でコメントしてください。
            1. 変更内容の要約（箇条書き）
            2. 正典UI（Change-Staff UI）が維持されているか、破壊の懸念はないか
            3. リファクタリング（GASからReactへのロジック移譲）が適切に行われているか
          diff-file: 'pr_diff.txt'
